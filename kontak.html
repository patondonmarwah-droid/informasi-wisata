  <main>
    <section class="contact-section">
      <h1>Hubungi Kami</h1>
      <p>Punya pertanyaan atau masukan? Kirimkan pesan Anda melalui formulir di bawah ini.</p>

      <form id="contact-form" class="contact-form">
        <div class="form-group">
          <label for="nama">Nama Lengkap:</label>
          <input type="text" id="nama" name="nama" placeholder="Masukkan nama Anda" required minlength="3">
        </div>

        <div class="form-group">
          <label for="email">Alamat Email:</label>
          <input type="email" id="email" name="email" placeholder="contoh@email.com" required>
        </div>

        <div class="form-group">
          <label for="pesan">Pesan:</label>
          <textarea id="pesan" name="pesan" rows="5" placeholder="Tuliskan pesan Anda..." required minlength="10"></textarea>
        </div>

        <button type="submit" class="btn-submit">Kirim Pesan</button>
      </form>
      
      <div id="form-feedback" class="feedback-msg"></div>
    </section>
  </main>
